<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Loop</title>
<style>
:root{--bg:#f7f5fb;--ink:#17131f;--muted:#80788d;--line:#e5e0eb;--soft:#f1edf7;--card:#fff;--purple:#5f2eea;--green:#087f4f;--red:#c7334d;--amber:#8b5a05;--blue:#2457c5;--shadow:0 16px 42px rgba(36,26,61,.08);--r:22px;--r2:15px}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:linear-gradient(180deg,#fbfaff 0,#f7f5fb 34%,#f4faf6 100%);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}button,input,select{font:inherit}button{cursor:pointer}a{text-decoration:none;color:inherit}.shell{width:min(980px,calc(100% - 24px));margin:auto;padding:14px 0 38px}.top{position:sticky;top:8px;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 10px 10px 14px;border:1px solid var(--line);border-radius:24px;background:rgba(255,255,255,.86);backdrop-filter:blur(18px);box-shadow:0 12px 30px rgba(35,28,53,.07)}.brand{font-size:24px;font-weight:850;letter-spacing:-.055em}.nav{display:flex;gap:6px;align-items:center}.tab,.addBtn{border:1px solid transparent;background:transparent;border-radius:999px;padding:10px 13px;color:var(--muted);font-weight:650}.tab.active{background:var(--soft);color:var(--ink);border-color:var(--line)}.addBtn{background:var(--ink);color:#fff;border-color:var(--ink)}.pageHead{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin:24px 0 14px}.eyebrow{font-size:12px;font-weight:850;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}h1,h2,h3,p{margin-top:0}h1{margin-bottom:0;font-size:clamp(34px,8vw,62px);line-height:.94;letter-spacing:-.07em}h2{margin:0;font-size:30px;line-height:1;letter-spacing:-.055em}h3{margin:0;font-size:18px;line-height:1.2;letter-spacing:-.035em}.count{border:1px solid var(--line);background:#fff;border-radius:999px;padding:8px 11px;color:var(--muted);font-size:13px;font-weight:750}.view{display:none}.view.active{display:block}.empty{border:1px dashed #d8d1e1;border-radius:22px;background:rgba(255,255,255,.7);padding:34px 22px;text-align:center;color:var(--muted)}.empty strong{display:block;color:var(--ink);font-size:19px;margin-bottom:6px}.eventList{display:grid;gap:10px}.eventCard{border:1px solid var(--line);border-radius:22px;background:rgba(255,255,255,.92);box-shadow:var(--shadow);overflow:hidden}.eventMain{display:grid;grid-template-columns:66px minmax(0,1fr);gap:12px;padding:13px}.dateBox{border-radius:16px;background:var(--soft);min-height:66px;display:grid;place-items:center;text-align:center;color:var(--purple);font-weight:900}.dateBox .m{font-size:11px;letter-spacing:.12em;text-transform:uppercase}.dateBox .d{font-size:28px;letter-spacing:-.06em;line-height:1}.eventContent{min-width:0}.meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;color:var(--muted);font-size:13px;margin:6px 0 9px}.dot{width:3px;height:3px;border-radius:50%;background:currentColor;opacity:.55}.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}.chip{display:inline-flex;align-items:center;border:1px solid rgba(23,19,31,.07);border-radius:999px;padding:6px 9px;font-size:12px;font-weight:750;background:#f3f0fb;color:#4e3a72}.interested{background:#def7e9;color:#066640}.cant{background:#ffe4ea;color:#9b2137}.talk{background:#fff2cf;color:#805000}.booked{background:#e4edff;color:#1d4fa5}.cancelled{background:#edf0f4;color:#5e6470}.nostatus{background:#f4f2f7;color:var(--muted)}.actions{display:flex;gap:7px;padding:0 13px 13px;flex-wrap:wrap}.action{border:1px solid var(--line);background:#fff;border-radius:13px;padding:9px 11px;font-weight:700;color:var(--ink);font-size:14px}.action.primary{background:var(--ink);border-color:var(--ink);color:#fff}.action.danger{color:var(--red)}.drawer{display:none;border-top:1px solid var(--line);background:#fbfaff;padding:13px}.drawer.open{display:block}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field{display:grid;gap:5px}label{font-size:12px;font-weight:800;color:var(--muted)}input,select{width:100%;min-height:44px;border:1px solid var(--line);border-radius:13px;background:#fff;color:var(--ink);padding:11px 12px;outline:none}input:focus,select:focus{border-color:#b9a7ee;box-shadow:0 0 0 4px rgba(95,46,234,.08)}.full{grid-column:1/-1}.save{border:0;background:var(--green);color:#fff;border-radius:13px;min-height:44px;padding:11px 13px;font-weight:850}.modal{position:fixed;inset:0;z-index:50;display:none;background:rgba(20,16,28,.34);backdrop-filter:blur(5px);padding:18px}.modal.open{display:grid;place-items:end center}.sheet{width:min(620px,100%);max-height:min(760px,90vh);overflow:auto;background:#fff;border:1px solid var(--line);border-radius:26px;box-shadow:0 30px 90px rgba(30,22,48,.25);padding:16px}.sheetHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}.x{border:0;background:#f4f2f7;border-radius:999px;width:38px;height:38px;color:var(--muted);font-size:20px}.submit{width:100%;border:0;background:var(--green);color:#fff;border-radius:15px;min-height:48px;font-weight:900}.timelineList{position:relative;display:grid;gap:0;margin-top:8px}.tlItem{position:relative;display:grid;grid-template-columns:52px 1fr;gap:12px;padding:0 0 18px}.tlItem:before{content:"";position:absolute;left:25px;top:42px;bottom:0;width:1px;background:var(--line)}.tlItem:last-child:before{display:none}.tlDate{width:52px;height:52px;border-radius:16px;background:var(--soft);display:grid;place-items:center;color:var(--purple);font-weight:900}.tlDate span{display:block;text-align:center}.tlDate .mm{font-size:10px;letter-spacing:.1em;text-transform:uppercase}.tlDate .dd{font-size:22px;line-height:1;letter-spacing:-.06em}.tlBody{border:1px solid var(--line);background:#fff;border-radius:18px;padding:12px;box-shadow:0 8px 26px rgba(36,26,61,.05)}.toast{position:fixed;left:50%;bottom:20px;z-index:80;transform:translateX(-50%) translateY(16px);opacity:0;pointer-events:none;border-radius:999px;background:var(--ink);color:#fff;padding:10px 14px;font-size:14px;transition:.18s}.toast.show{opacity:1;transform:translateX(-50%)}@media(max-width:680px){.shell{width:min(100% - 18px,980px);padding-top:8px}.top{border-radius:22px;align-items:flex-start;flex-direction:column}.nav{width:100%;overflow:auto}.tab,.addBtn{padding:9px 12px}.pageHead{margin-top:20px}.grid{grid-template-columns:1fr}.full{grid-column:auto}.eventMain{grid-template-columns:58px 1fr}.dateBox{min-height:58px}.actions{display:grid;grid-template-columns:1fr 1fr}.action.primary{grid-column:1/-1}.sheet{border-radius:24px 24px 0 0}.modal.open{place-items:end center;padding:0}.modal{padding:0}h1{font-size:42px}}
</style>
</head>
<body>
<main class="shell">
<header class="top"><div class="brand">loop</div><nav class="nav"><button class="tab active" data-view="events">Events</button><button class="tab" data-view="timeline">Timeline</button><button class="addBtn" id="openAdd">Add Event</button></nav></header>
<section id="events" class="view active"><div class="pageHead"><div><div class="eyebrow">Events</div><h1>Plans</h1></div><span class="count" id="eventCount">0 events</span></div><div class="eventList" id="eventList"></div></section>
<section id="timeline" class="view"><div class="pageHead"><div><div class="eyebrow">Timeline</div><h1 id="timelineTitle">Month</h1></div></div><div class="timelineList" id="timelineList"></div></section>
</main>
<div class="modal" id="addModal" aria-hidden="true"><div class="sheet"><div class="sheetHead"><h2>Add Event</h2><button class="x" id="closeAdd">×</button></div><form id="eventForm" class="grid"><div class="field full"><label>Event Name</label><input id="name" required></div><div class="field"><label>Category</label><select id="cat"><option value="" selected disabled>Select category</option><option>Food</option><option>Music</option><option>Comedy</option><option>Culture</option><option>Sport</option><option>Nightlife</option><option>Market</option><option>Other</option></select></div><div class="field"><label>Price</label><select id="price"><option>I don't know</option><option>Free</option><option>Under £5</option><option>Under £10</option><option>Under £15</option><option>Under £20</option><option>Under £25</option><option>Over £25</option></select></div><div class="field"><label>Date</label><input id="date" type="date" required></div><div class="field"><label>Time</label><input id="time" type="time" required></div><div class="field full"><label>Ticket Page Link</label><input id="ticket" type="url"></div><div class="field"><label>Postcode</label><input id="postcode" required></div><div class="field"><label>Added By</label><input id="added" maxlength="4" required></div><button class="submit full" type="submit">Save Event</button></form></div></div>
<div class="toast" id="toast">Saved</div>
<script>
const KEY='loop-product-events-v1';const statuses=["Interested","Can't Attend","Let's Talk","Booked","Cancelled"];let events=load();
function load(){try{return JSON.parse(localStorage.getItem(KEY)||'[]')}catch{return[]}}function save(){localStorage.setItem(KEY,JSON.stringify(events))}function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1200)}function init(v){return String(v||'').trim().toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,4)}function esc(v){return String(v||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}function dt(s){return new Date(s+'T00:00:00')}function mon(s){return dt(s).toLocaleDateString('en-GB',{month:'short'})}function day(s){return dt(s).toLocaleDateString('en-GB',{day:'2-digit'})}function full(s){return dt(s).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})}function month(s){return dt(s).toLocaleDateString('en-GB',{month:'long',year:'numeric'})}function maps(p){return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(p)}function cls(s){return {'Interested':'interested',"Can't Attend":'cant',"Let's Talk":'talk','Booked':'booked','Cancelled':'cancelled'}[s]||'nostatus'}function opts(sel='Interested'){return statuses.map(s=>`<option ${s===sel?'selected':''}>${s}</option>`).join('')}function sorted(){return[...events].sort((a,b)=>(a.date+'T'+a.time).localeCompare(b.date+'T'+b.time))}function chips(e){const a=Object.entries(e.entries||{});return a.length?a.map(([i,s])=>`<span class="chip ${cls(s)}">${esc(i)} · ${esc(s)}</span>`).join(''):'<span class="chip nostatus">No status</span>'}
function renderEvents(){const el=document.getElementById('eventList'),list=sorted();document.getElementById('eventCount').textContent=events.length+' event'+(events.length===1?'':'s');if(!list.length){el.innerHTML='<div class="empty"><strong>No events yet</strong>Tap Add Event to create the first plan.</div>';return}el.innerHTML=list.map(e=>`<article class="eventCard"><div class="eventMain"><div class="dateBox"><div><span class="m">${mon(e.date)}</span><span class="d">${day(e.date)}</span></div></div><div class="eventContent"><h3>${esc(e.name)}</h3><div class="meta"><span>${esc(e.time)}</span><span class="dot"></span><span>${esc(e.category)}</span><span class="dot"></span><span>${esc(e.price)}</span><span class="dot"></span><span>${esc(e.postcode)}</span></div><div class="chips">${chips(e)}</div></div></div><div class="actions"><a class="action" target="_blank" rel="noreferrer" href="${maps(e.postcode)}">Directions</a>${e.ticket?`<a class="action" target="_blank" rel="noreferrer" href="${esc(e.ticket)}">Ticket</a>`:'<button class="action" disabled>No ticket</button>'}<button class="action primary" data-toggle="${e.id}">Respond / Edit</button><button class="action danger" data-del="${e.id}">Remove</button></div><div class="drawer" id="drawer-${e.id}"><div class="grid"><div class="field"><label>Initials</label><input maxlength="4" data-in="${e.id}"></div><div class="field"><label>Status</label><select data-st="${e.id}">${opts()}</select></div><button class="save full" data-save="${e.id}">Save Status</button></div></div></article>`).join('');el.querySelectorAll('[data-toggle]').forEach(b=>b.onclick=()=>document.getElementById('drawer-'+b.dataset.toggle).classList.toggle('open'));el.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{events=events.filter(e=>e.id!==b.dataset.del);save();render();toast('Removed')});el.querySelectorAll('[data-save]').forEach(b=>b.onclick=()=>saveEntry(b.dataset.save));el.querySelectorAll('[data-in]').forEach(i=>i.oninput=()=>{i.value=init(i.value);const e=events.find(x=>x.id===i.dataset.in);if(e&&e.entries&&e.entries[i.value])document.querySelector(`[data-st="${i.dataset.in}"]`).value=e.entries[i.value]})}
function saveEntry(id){const i=document.querySelector(`[data-in="${id}"]`),s=document.querySelector(`[data-st="${id}"]`),v=init(i.value);if(!v){toast('Enter initials');i.focus();return}events=events.map(e=>e.id===id?{...e,entries:{...(e.entries||{}),[v]:s.value}}:e);save();render();toast('Saved')}
function renderTimeline(){const box=document.getElementById('timelineList'),list=sorted();if(!list.length){document.getElementById('timelineTitle').textContent='Timeline';box.innerHTML='<div class="empty"><strong>No timeline yet</strong>Events appear here once added.</div>';return}document.getElementById('timelineTitle').textContent=month(list[0].date);box.innerHTML=list.map(e=>`<div class="tlItem"><div class="tlDate"><span class="mm">${mon(e.date)}</span><span class="dd">${day(e.date)}</span></div><div class="tlBody"><h3>${esc(e.name)}</h3><div class="meta"><span>${esc(e.time)}</span><span class="dot"></span><span>${esc(e.category)}</span><span class="dot"></span><span>${esc(e.postcode)}</span></div><div class="chips">${chips(e)}</div></div></div>`).join('')}
function render(){renderEvents();renderTimeline()}document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-view]').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById(b.dataset.view).classList.add('active')});document.getElementById('openAdd').onclick=()=>document.getElementById('addModal').classList.add('open');document.getElementById('closeAdd').onclick=()=>document.getElementById('addModal').classList.remove('open');document.getElementById('addModal').onclick=e=>{if(e.target.id==='addModal')e.currentTarget.classList.remove('open')};document.getElementById('eventForm').onsubmit=e=>{e.preventDefault();const added=init(document.getElementById('added').value);if(!added){toast('Enter initials');return}const ev={id:String(Date.now()),name:document.getElementById('name').value.trim(),category:document.getElementById('cat').value,date:document.getElementById('date').value,time:document.getElementById('time').value,ticket:document.getElementById('ticket').value.trim(),price:document.getElementById('price').value,postcode:document.getElementById('postcode').value.trim().toUpperCase(),added,entries:{}};events=[...events,ev];save();e.target.reset();document.getElementById('price').value="I don't know";document.getElementById('addModal').classList.remove('open');render();toast('Event added')};render();
</script>
</body>
</html>
