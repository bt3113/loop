<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Loop</title>
<style>
:root{--bg:#f6f4fb;--ink:#15111d;--muted:#7c7488;--line:#e4deeb;--soft:#f1edf7;--card:#fff;--purple:#5f31e6;--green:#087f4f;--red:#c63751;--amber:#885400;--blue:#2457c5;--shadow:0 18px 48px rgba(31,24,46,.08);--r:24px;--r2:16px}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;min-height:100vh;color:var(--ink);background:radial-gradient(circle at 12% 0,rgba(171,143,255,.28),transparent 24rem),radial-gradient(circle at 88% 12%,rgba(168,238,199,.34),transparent 24rem),linear-gradient(180deg,#fbfaff 0,#f7f4fb 44%,#f7fbf8 100%);font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}button,input,select{font:inherit}button{cursor:pointer}a{text-decoration:none;color:inherit}.shell{width:min(980px,calc(100% - 24px));margin:auto;padding:14px 0 38px}.top{position:sticky;top:8px;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 10px 10px 15px;border:1px solid var(--line);border-radius:25px;background:rgba(255,255,255,.88);backdrop-filter:blur(18px);box-shadow:0 12px 34px rgba(25,19,40,.07)}.brand{font-size:25px;font-weight:880;letter-spacing:-.06em}.nav{display:flex;gap:6px;align-items:center}.tab,.addBtn{border:1px solid transparent;background:transparent;border-radius:999px;padding:10px 13px;color:var(--muted);font-weight:720}.tab.active{background:var(--soft);color:var(--ink);border-color:var(--line)}.addBtn{background:#14101c;color:#fff;border-color:#14101c;box-shadow:0 10px 22px rgba(20,16,28,.16)}.view{display:none}.view.active{display:block}.pageHead{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin:24px 0 14px}.eyebrow{font-size:12px;font-weight:850;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}h1,h2,h3,p{margin-top:0}h1{margin-bottom:0;font-size:clamp(34px,8vw,58px);line-height:.94;letter-spacing:-.07em}h2{margin:0;font-size:29px;line-height:1;letter-spacing:-.055em}h3{margin:0;font-size:18px;line-height:1.2;letter-spacing:-.035em}.count,.smallPill{border:1px solid var(--line);background:rgba(255,255,255,.88);border-radius:999px;padding:8px 11px;color:var(--muted);font-size:13px;font-weight:760}.eventList{display:grid;gap:10px}.empty{position:relative;overflow:hidden;border:1px dashed #d8d1e1;border-radius:24px;background:rgba(255,255,255,.78);padding:30px 22px;text-align:left;color:var(--muted);box-shadow:var(--shadow)}.emptyGrid{display:grid;grid-template-columns:1fr 130px;gap:14px;align-items:center}.empty strong{display:block;color:var(--ink);font-size:20px;margin-bottom:6px}.empty svg{width:130px;height:auto}.eventCard{border:1px solid var(--line);border-radius:23px;background:rgba(255,255,255,.94);box-shadow:var(--shadow);overflow:hidden}.eventMain{display:grid;grid-template-columns:62px minmax(0,1fr);gap:12px;padding:13px}.dateBox{border-radius:17px;background:linear-gradient(160deg,#f2edff,#e9fff2);min-height:62px;display:grid;place-items:center;text-align:center;color:var(--purple);font-weight:900;border:1px solid rgba(95,49,230,.08)}.dateBox .m{display:block;font-size:10px;letter-spacing:.13em;text-transform:uppercase}.dateBox .d{display:block;font-size:28px;letter-spacing:-.06em;line-height:1}.eventContent{min-width:0}.eventContent h3{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center;color:var(--muted);font-size:13px;margin:6px 0 8px}.dot{width:3px;height:3px;border-radius:50%;background:currentColor;opacity:.55}.chips{display:flex;flex-wrap:wrap;gap:6px}.chip{display:inline-flex;align-items:center;border:1px solid rgba(23,19,31,.07);border-radius:999px;padding:6px 9px;font-size:12px;font-weight:780;background:#f3f0fb;color:#4e3a72}.interested{background:#def7e9;color:#066640}.cant{background:#ffe4ea;color:#9b2137}.talk{background:#fff2cf;color:#805000}.booked{background:#e4edff;color:#1d4fa5}.cancelled{background:#edf0f4;color:#5e6470}.nostatus{background:#f5f3f8;color:var(--muted)}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 13px 13px}.action{border:1px solid var(--line);background:#fff;border-radius:14px;padding:10px 11px;font-weight:760;color:var(--ink);font-size:14px;text-align:center}.action.primary{grid-column:1/-1;background:#14101c;border-color:#14101c;color:#fff}.action.danger{color:var(--red)}.drawer{display:none;border-top:1px solid var(--line);background:#fbfaff;padding:13px}.drawer.open{display:block}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field{display:grid;gap:5px}label{font-size:12px;font-weight:820;color:var(--muted)}input,select{width:100%;min-height:44px;border:1px solid var(--line);border-radius:14px;background:#fff;color:var(--ink);padding:11px 12px;outline:none}input:focus,select:focus{border-color:#b9a7ee;box-shadow:0 0 0 4px rgba(95,46,234,.08)}.full{grid-column:1/-1}.save,.submit{border:0;background:var(--green);color:#fff;border-radius:14px;min-height:44px;padding:11px 13px;font-weight:880}.modal{position:fixed;inset:0;z-index:50;display:none;background:rgba(20,16,28,.36);backdrop-filter:blur(6px);padding:18px}.modal.open{display:grid;place-items:end center}.sheet{width:min(620px,100%);max-height:min(780px,90vh);overflow:auto;background:#fff;border:1px solid var(--line);border-radius:27px;box-shadow:0 30px 90px rgba(30,22,48,.25);padding:16px}.sheetHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}.x{border:0;background:#f4f2f7;border-radius:999px;width:38px;height:38px;color:var(--muted);font-size:20px}.urlTool{border:1px solid var(--line);background:#fbfaff;border-radius:18px;padding:12px;margin-bottom:12px}.urlRow{display:grid;grid-template-columns:1fr auto;gap:8px}.miniBtn{border:1px solid var(--line);background:#15111d;color:#fff;border-radius:13px;padding:10px 12px;font-weight:820}.timelineList{position:relative;display:grid;gap:0;margin-top:8px}.tlItem{position:relative;display:grid;grid-template-columns:52px 1fr;gap:12px;padding:0 0 18px}.tlItem:before{content:"";position:absolute;left:25px;top:42px;bottom:0;width:1px;background:var(--line)}.tlItem:last-child:before{display:none}.tlDate{width:52px;height:52px;border-radius:16px;background:linear-gradient(160deg,#f2edff,#e9fff2);display:grid;place-items:center;color:var(--purple);font-weight:900}.tlDate span{display:block;text-align:center}.tlDate .mm{font-size:10px;letter-spacing:.1em;text-transform:uppercase}.tlDate .dd{font-size:22px;line-height:1;letter-spacing:-.06em}.tlBody{border:1px solid var(--line);background:#fff;border-radius:18px;padding:12px;box-shadow:0 8px 26px rgba(36,26,61,.05)}.ganttWrap{overflow-x:auto;border:1px solid var(--line);border-radius:22px;background:#fff;box-shadow:var(--shadow)}.gantt{min-width:740px;padding:14px}.ganttDays{display:grid;grid-template-columns:140px repeat(31,18px);gap:4px;color:var(--muted);font-size:10px;margin-bottom:10px}.ganttRow{display:grid;grid-template-columns:140px repeat(31,18px);gap:4px;align-items:center;margin:8px 0}.ganttName{font-size:13px;font-weight:780;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.gCell{height:18px;border-radius:6px;background:#f4f2f7}.gBar{background:linear-gradient(135deg,#6f3ff0,#31c383);box-shadow:0 6px 16px rgba(95,49,230,.18)}.toast{position:fixed;left:50%;bottom:20px;z-index:80;transform:translateX(-50%) translateY(16px);opacity:0;pointer-events:none;border-radius:999px;background:var(--ink);color:#fff;padding:10px 14px;font-size:14px;transition:.18s}.toast.show{opacity:1;transform:translateX(-50%)}@media(max-width:680px){.shell{width:min(100% - 18px,980px);padding-top:8px}.top{align-items:flex-start;flex-direction:column}.nav{width:100%;overflow:auto}.tab,.addBtn{padding:9px 12px}.pageHead{margin-top:20px}.grid,.urlRow{grid-template-columns:1fr}.full{grid-column:auto}.sheet{border-radius:24px 24px 0 0}.modal.open{place-items:end center;padding:0}.modal{padding:0}h1{font-size:42px}.emptyGrid{grid-template-columns:1fr}.empty svg{width:112px;justify-self:end}.eventContent h3{white-space:normal}.actions{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<main class="shell"><header class="top"><div class="brand">loop</div><nav class="nav"><button class="tab active" data-view="events">Events</button><button class="tab" data-view="timeline">Timeline</button><button class="tab" data-view="gantt">Gantt</button><button class="addBtn" id="openAdd">Add Event</button></nav></header><section id="events" class="view active"><div class="pageHead"><div><div class="eyebrow">Events</div><h1>Plans</h1></div><span class="count" id="eventCount">0 events</span></div><div class="eventList" id="eventList"></div></section><section id="timeline" class="view"><div class="pageHead"><div><div class="eyebrow">Timeline</div><h1 id="timelineTitle">Timeline</h1></div></div><div class="timelineList" id="timelineList"></div></section><section id="gantt" class="view"><div class="pageHead"><div><div class="eyebrow">Gantt</div><h1 id="ganttTitle">Month</h1></div></div><div id="ganttBox"></div></section></main>
<div class="modal" id="addModal" aria-hidden="true"><div class="sheet"><div class="sheetHead"><h2>Add Event</h2><button class="x" id="closeAdd">×</button></div><div class="urlTool"><label>Eventbrite URL helper</label><div class="urlRow"><input id="eventbriteUrl" type="url" placeholder="Paste Eventbrite link"><button class="miniBtn" id="parseEventbrite" type="button">Fill</button></div></div><form id="eventForm" class="grid"><div class="field full"><label>Event Name</label><input id="name" required></div><div class="field"><label>Category</label><select id="cat" required><option value="" selected disabled>Select category</option><option>Food</option><option>Music</option><option>Comedy</option><option>Culture</option><option>Sport</option><option>Nightlife</option><option>Market</option><option>Other</option></select></div><div class="field"><label>Price</label><select id="price"><option>I don't know</option><option>Free</option><option>Under £5</option><option>Under £10</option><option>Under £15</option><option>Under £20</option><option>Under £25</option><option>Over £25</option></select></div><div class="field"><label>Date</label><input id="date" type="date" required></div><div class="field"><label>Time</label><input id="time" type="time" required></div><div class="field full"><label>Ticket Page Link</label><input id="ticket" type="url"></div><div class="field"><label>Postcode</label><input id="postcode" required></div><div class="field"><label>Added By</label><input id="added" maxlength="4" required></div><button class="submit full" type="submit">Save Event</button></form></div></div><div class="toast" id="toast">Saved</div>
<script>
const SUPABASE_URL='https://apvzsvwqxnnjpyrkikns.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFwdnpzdndxeG5uanB5cmtpa25zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NjgwODUsImV4cCI6MjA5NDI0NDA4NX0.aNhZJkoDpJknhimyf6n1IUPca4Rrqesuxjk_jAPSj5M';
const DELETE_CODE='1313';const statuses=["Interested","Can't Attend","Let's Talk","Booked","Cancelled"];let events=[];
const headers={apikey:SUPABASE_ANON_KEY,Authorization:`Bearer ${SUPABASE_ANON_KEY}`,'Content-Type':'application/json'};
async function api(path,options={}){const r=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{...options,headers:{...headers,...(options.headers||{})}});if(!r.ok){const t=await r.text();throw new Error(t||r.statusText)}return r.status===204?null:r.json()}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1400)}function init(v){return String(v||'').trim().toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,4)}function esc(v){return String(v||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}function dt(s){return new Date(s+'T00:00:00')}function mon(s){return dt(s).toLocaleDateString('en-GB',{month:'short'})}function day(s){return dt(s).toLocaleDateString('en-GB',{day:'2-digit'})}function month(s){return dt(s).toLocaleDateString('en-GB',{month:'long',year:'numeric'})}function maps(p){return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(p)}function cls(s){return {'Interested':'interested',"Can't Attend":'cant',"Let's Talk":'talk','Booked':'booked','Cancelled':'cancelled'}[s]||'nostatus'}function opts(sel='Interested'){return statuses.map(s=>`<option ${s===sel?'selected':''}>${s}</option>`).join('')}function sorted(){return[...events].sort((a,b)=>(a.date+'T'+a.time).localeCompare(b.date+'T'+b.time))}function chips(e){const a=Object.entries(e.entries||{});return a.length?a.map(([i,s])=>`<span class="chip ${cls(s)}">${esc(i)} · ${esc(s)}</span>`).join(''):'<span class="chip nostatus">No status</span>'}function empty(title,text){return `<div class="empty"><div class="emptyGrid"><div><strong>${title}</strong>${text}</div><svg viewBox="0 0 180 130" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="18" y="20" width="128" height="86" rx="20" fill="#fff" stroke="#dfd8ea"/><rect x="36" y="40" width="42" height="10" rx="5" fill="#ece6f7"/><rect x="36" y="60" width="82" height="8" rx="4" fill="#f2edf7"/><rect x="36" y="76" width="62" height="8" rx="4" fill="#f2edf7"/><circle cx="136" cy="34" r="25" fill="#e9fff2"/><path d="M126 35h20M136 25v20" stroke="#087f4f" stroke-width="6" stroke-linecap="round"/></svg></div></div>`}
function mapRows(rows){return rows.map(r=>{const entries={};(r.loop_event_entries||[]).forEach(x=>entries[x.initials]=x.status);return{id:r.id,name:r.name,category:r.category,date:r.event_date,time:String(r.event_time).slice(0,5),ticket:r.ticket_url||'',price:r.price,postcode:r.postcode,added:r.added_by,entries}})}
async function loadEvents(){try{const rows=await api('loop_events?select=*,loop_event_entries(*)&order=event_date.asc&order=event_time.asc');events=mapRows(rows);render()}catch(e){console.error(e);document.getElementById('eventList').innerHTML=empty('Database not ready','Run the Supabase SQL schema, then refresh.');toast('Database error')}}
function renderEvents(){const el=document.getElementById('eventList'),list=sorted();document.getElementById('eventCount').textContent=events.length+' event'+(events.length===1?'':'s');if(!list.length){el.innerHTML=empty('No events yet','Tap Add Event to create the first shared plan.');return}el.innerHTML=list.map(e=>`<article class="eventCard"><div class="eventMain"><div class="dateBox"><div><span class="m">${mon(e.date)}</span><span class="d">${day(e.date)}</span></div></div><div class="eventContent"><h3>${esc(e.name)}</h3><div class="meta"><span>${esc(e.time)}</span><span class="dot"></span><span>${esc(e.category)}</span><span class="dot"></span><span>${esc(e.price)}</span><span class="dot"></span><span>${esc(e.postcode)}</span></div><div class="chips">${chips(e)}</div></div></div><div class="actions"><a class="action" target="_blank" rel="noreferrer" href="${maps(e.postcode)}">Directions</a>${e.ticket?`<a class="action" target="_blank" rel="noreferrer" href="${esc(e.ticket)}">Ticket</a>`:'<button class="action" disabled>No ticket</button>'}<button class="action primary" data-toggle="${e.id}">Respond / Edit</button><button class="action danger" data-del="${e.id}">Remove</button></div><div class="drawer" id="drawer-${e.id}"><div class="grid"><div class="field"><label>Initials</label><input maxlength="4" data-in="${e.id}"></div><div class="field"><label>Status</label><select data-st="${e.id}">${opts()}</select></div><button class="save full" data-save="${e.id}">Save Status</button></div></div></article>`).join('');el.querySelectorAll('[data-toggle]').forEach(b=>b.onclick=()=>document.getElementById('drawer-'+b.dataset.toggle).classList.toggle('open'));el.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>deleteEvent(b.dataset.del));el.querySelectorAll('[data-save]').forEach(b=>b.onclick=()=>saveEntry(b.dataset.save));el.querySelectorAll('[data-in]').forEach(i=>i.oninput=()=>{i.value=init(i.value);const e=events.find(x=>x.id===i.dataset.in);if(e&&e.entries&&e.entries[i.value])document.querySelector(`[data-st="${i.dataset.in}"]`).value=e.entries[i.value]})}
async function deleteEvent(id){const code=prompt('Enter delete passcode');if(code!==DELETE_CODE){toast('Wrong passcode');return}try{await api(`loop_events?id=eq.${encodeURIComponent(id)}`,{method:'DELETE'});events=events.filter(e=>e.id!==id);render();toast('Removed')}catch(e){console.error(e);toast('Delete failed')}}
async function saveEntry(id){const i=document.querySelector(`[data-in="${id}"]`),s=document.querySelector(`[data-st="${id}"]`),v=init(i.value);if(!v){toast('Enter initials');i.focus();return}try{await api('loop_event_entries?on_conflict=event_id,initials',{method:'POST',headers:{Prefer:'resolution=merge-duplicates'},body:JSON.stringify({event_id:id,initials:v,status:s.value})});await loadEvents();toast('Saved')}catch(e){console.error(e);toast('Save failed')}}
function renderTimeline(){const box=document.getElementById('timelineList'),list=sorted();if(!list.length){document.getElementById('timelineTitle').textContent='Timeline';box.innerHTML=empty('No timeline yet','Events appear here once added.');return}document.getElementById('timelineTitle').textContent=month(list[0].date);box.innerHTML=list.map(e=>`<div class="tlItem"><div class="tlDate"><span class="mm">${mon(e.date)}</span><span class="dd">${day(e.date)}</span></div><div class="tlBody"><h3>${esc(e.name)}</h3><div class="meta"><span>${esc(e.time)}</span><span class="dot"></span><span>${esc(e.category)}</span><span class="dot"></span><span>${esc(e.postcode)}</span></div><div class="chips">${chips(e)}</div></div></div>`).join('')}
function renderGantt(){const box=document.getElementById('ganttBox'),list=sorted();if(!list.length){document.getElementById('ganttTitle').textContent='Gantt';box.innerHTML=empty('No Gantt view yet','Add events to see them plotted across the month.');return}document.getElementById('ganttTitle').textContent=month(list[0].date);const days=Array.from({length:31},(_,i)=>i+1);box.innerHTML=`<div class="ganttWrap"><div class="gantt"><div class="ganttDays"><span></span>${days.map(d=>`<span>${d}</span>`).join('')}</div>${list.map(e=>{const d=Number(day(e.date));return `<div class="ganttRow"><div class="ganttName">${esc(e.name)}</div>${days.map(x=>`<div class="gCell ${x===d?'gBar':''}"></div>`).join('')}</div>`}).join('')}</div></div>`}
function render(){renderEvents();renderTimeline();renderGantt()}document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-view]').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById(b.dataset.view).classList.add('active')});document.getElementById('openAdd').onclick=()=>document.getElementById('addModal').classList.add('open');document.getElementById('closeAdd').onclick=()=>document.getElementById('addModal').classList.remove('open');document.getElementById('addModal').onclick=e=>{if(e.target.id==='addModal')e.currentTarget.classList.remove('open')};document.getElementById('parseEventbrite').onclick=()=>{const url=document.getElementById('eventbriteUrl').value.trim();if(!url){toast('Paste a link first');return}document.getElementById('ticket').value=url;try{const u=new URL(url);let slug=u.pathname.split('/').filter(Boolean).find(x=>x.length>8&&x!=='e');if(slug){slug=slug.replace(/-tickets.*$/,'').replace(/-\d+$/,'').replace(/-/g,' ');document.getElementById('name').value=slug.replace(/\b\w/g,c=>c.toUpperCase())}}catch{}toast('Link added')};
document.getElementById('eventForm').onsubmit=async e=>{e.preventDefault();const added=init(document.getElementById('added').value);if(!added){toast('Enter initials');return}const payload={name:document.getElementById('name').value.trim(),category:document.getElementById('cat').value,event_date:document.getElementById('date').value,event_time:document.getElementById('time').value,ticket_url:document.getElementById('ticket').value.trim()||null,price:document.getElementById('price').value,postcode:document.getElementById('postcode').value.trim().toUpperCase(),added_by:added};try{await api('loop_events',{method:'POST',headers:{Prefer:'return=minimal'},body:JSON.stringify(payload)});e.target.reset();document.getElementById('price').value="I don't know";document.getElementById('eventbriteUrl').value='';document.getElementById('addModal').classList.remove('open');await loadEvents();toast('Event added')}catch(err){console.error(err);toast('Add failed')}};
render();loadEvents();
</script>
</body>
</html>
