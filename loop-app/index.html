<style>
:root{--ink:#111;--paper:#f6f6f3;--muted:#747474;--line:#e7e7e2;--soft:#f0f0ec;--black:#050505;--orange:#ff8f70;--green:#087f4f;--red:#bd3150;--blue:#1b4ea8;--shadow:0 20px 60px rgba(0,0,0,.10)}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:#f4f4f0;color:var(--ink);font-family:"Space Grotesk",system-ui,sans-serif}button,input,select,textarea{font:inherit}button{cursor:pointer}a{text-decoration:none;color:inherit}.app{width:min(1040px,100%);margin:auto;background:#fff;min-height:100vh}.shell{padding:12px 14px 38px}.siteHead{position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 14px;background:rgba(255,255,255,.94);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}.logo{display:flex;align-items:center;gap:9px;font-weight:700;letter-spacing:-.06em;font-size:24px}.logoMark{width:31px;height:31px;border-radius:50%;display:grid;place-items:center;background:#050505;color:#fff;font-family:"IBM Plex Mono",monospace;font-size:14px}.nav{display:flex;gap:8px;align-items:center;overflow:auto}.tab,.addBtn{border:1px solid transparent;border-radius:999px;padding:9px 12px;background:transparent;color:#777;font-weight:600;white-space:nowrap}.tab.active{background:#f0f0ec;color:#111;border-color:#e5e5df}.addBtn{background:#111;color:#fff;border-color:#111}.view{display:none}.view.active{display:block}.hero{position:relative;overflow:hidden;border-radius:0 0 34px 34px;background:#030303;color:#fff;min-height:360px;padding:24px 14px 116px}.heroGrid{display:grid;grid-template-columns:1fr 280px;gap:20px;align-items:start}.heroTitle{font-family:"IBM Plex Mono",monospace;font-size:clamp(28px,8vw,52px);line-height:1.16;font-weight:600;letter-spacing:-.05em;margin:0}.heroIcon{justify-self:end;width:64px;height:64px;border:1px solid rgba(255,255,255,.12);border-radius:0 0 24px 24px;display:grid;place-items:center}.heroIcon svg{width:38px}.star{position:absolute;opacity:.35}.star.one{left:46px;bottom:98px}.star.two{right:76px;bottom:82px}.calendarCard{position:relative;margin:-94px auto 18px;width:min(430px,calc(100% - 30px));z-index:5;background:#fff;border-radius:13px;box-shadow:0 18px 55px rgba(0,0,0,.16);padding:16px;color:#111}.calTop{display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:12px;color:#777;font-family:"IBM Plex Mono",monospace;font-size:12px}.calNav{border:0;background:transparent;color:#aaa;font-size:18px}.calGrid{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;text-align:center;font-family:"IBM Plex Mono",monospace}.calDow{font-size:10px;color:#9a9a9a}.calDay{height:29px;border-radius:4px;display:grid;place-items:center;font-size:11px;color:#777}.calDay.has{background:#ff9a7d;color:#fff}.calDay.primary{background:#050505;color:#fff}.sectionLabel{display:flex;align-items:center;justify-content:space-between;margin:22px 0 8px;font-family:"IBM Plex Mono",monospace;font-size:11px;text-transform:uppercase;letter-spacing:.08em}.seeAll{color:#7557ff;font-weight:600}.upcoming{background:#fff}.row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;padding:12px 0;border-top:1px solid #ededed}.row:last-child{border-bottom:1px solid #ededed}.rowTitle{font-size:16px;font-weight:700;letter-spacing:-.02em;margin:0 0 3px}.rowMeta{font-family:"IBM Plex Mono",monospace;font-size:11px;color:#777}.viewBtn{border:0;background:#f1f1ed;border-radius:9px;padding:10px 12px;font-size:11px;font-family:"IBM Plex Mono",monospace;font-weight:700;text-transform:uppercase;white-space:nowrap}.empty{padding:24px 0;color:#777;font-family:"IBM Plex Mono",monospace;font-size:13px}.detail{display:none;margin:0 0 14px;padding:14px;border:1px solid #e9e9e3;border-radius:18px;background:#fafaf7;box-shadow:0 10px 28px rgba(0,0,0,.04)}.detail.open{display:block}.detailGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:12px 0}.detailBox{background:#fff;border:1px solid #eaeae5;border-radius:12px;padding:9px;font-size:12px;color:#777}.detailBox strong{display:block;color:#111;font-size:14px;margin-top:2px;overflow-wrap:anywhere}.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}.chip{border-radius:999px;padding:6px 9px;font-family:"IBM Plex Mono",monospace;font-size:11px;font-weight:600;background:#efefea;color:#555}.interested{background:#e1f5e9;color:#0b6b44}.cant{background:#ffe4ea;color:#9b2137}.talk{background:#fff1cc;color:#805000}.booked{background:#e4edff;color:#1d4fa5}.cancelled{background:#eceff2;color:#5e6470}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.action{border:1px solid #e4e4df;background:#fff;border-radius:12px;padding:10px;font-size:13px;font-weight:700;text-align:center}.action.primary{grid-column:1/-1;background:#050505;color:#fff;border-color:#050505}.action.danger{color:var(--red)}.drawer{display:none;margin-top:10px;border-top:1px solid #e5e5df;padding-top:12px}.drawer.open{display:block}.formGrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field{display:grid;gap:5px}label{font-family:"IBM Plex Mono",monospace;font-size:11px;font-weight:600;color:#777;text-transform:uppercase;letter-spacing:.04em}input,select,textarea{width:100%;min-height:43px;border:1px solid #e3e3dd;border-radius:12px;background:#fff;color:#111;padding:10px 11px;outline:none}textarea{min-height:88px;resize:vertical}input:focus,select:focus,textarea:focus{border-color:#111}.full{grid-column:1/-1}.save,.submit{border:0;background:#067a4a;color:#fff;border-radius:12px;min-height:43px;font-weight:700}.modal{position:fixed;inset:0;z-index:60;display:none;background:rgba(0,0,0,.35);backdrop-filter:blur(6px);padding:18px}.modal.open{display:grid;place-items:end center}.sheet{width:min(640px,100%);max-height:min(820px,92vh);overflow:auto;background:#fff;border-radius:22px;padding:16px;box-shadow:0 28px 90px rgba(0,0,0,.28)}.sheetHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}.sheetHead h2{margin:0;font-size:26px;letter-spacing:-.04em}.x{border:0;background:#f1f1ed;border-radius:999px;width:38px;height:38px;font-size:20px}.urlTool{border:1px solid #e4e4df;background:#fafaf7;border-radius:16px;padding:12px;margin-bottom:12px}.urlRow{display:grid;grid-template-columns:1fr auto;gap:8px}.miniBtn{border:0;background:#050505;color:#fff;border-radius:12px;padding:10px 12px;font-weight:700}.helperText{font-family:"IBM Plex Mono",monospace;font-size:11px;color:#777;margin-top:7px}.subPage{padding:22px 0}.pageHead{display:flex;align-items:end;justify-content:space-between;margin:12px 0 18px}.pageHead h1{margin:0;font-size:42px;letter-spacing:-.05em}.timelineList{display:grid;gap:0}.tlItem{display:grid;grid-template-columns:48px 1fr;gap:12px;position:relative;padding-bottom:18px}.tlItem:before{content:"";position:absolute;left:23px;top:40px;bottom:0;width:1px;background:#deded8}.tlItem:last-child:before{display:none}.tlDate{width:48px;height:48px;border-radius:13px;background:#f1f1ed;display:grid;place-items:center;font-family:"IBM Plex Mono",monospace}.tlDate .mm{display:block;font-size:9px;text-transform:uppercase;color:#777}.tlDate .dd{display:block;font-size:20px;font-weight:700}.tlBody{background:#fff;border:1px solid #e9e9e3;border-radius:16px;padding:12px}.ganttWrap{overflow-x:auto;background:#fff;border:1px solid #e9e9e3;border-radius:18px}.gantt{min-width:760px;padding:14px}.ganttDays,.ganttRow{display:grid;grid-template-columns:150px repeat(31,18px);gap:4px}.ganttDays{font-family:"IBM Plex Mono",monospace;font-size:10px;color:#777;margin-bottom:10px}.ganttRow{align-items:center;margin:8px 0}.ganttName{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.gCell{height:18px;border-radius:5px;background:#f0f0ec}.gBar{background:#050505}.toast{position:fixed;left:50%;bottom:20px;z-index:80;transform:translateX(-50%) translateY(16px);opacity:0;pointer-events:none;border-radius:999px;background:#050505;color:#fff;padding:10px 14px;font-size:13px;transition:.18s;max-width:min(92vw,680px);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.toast.show{opacity:1;transform:translateX(-50%)}@media(min-width:820px){.shell{padding:18px 32px 48px}.hero{border-radius:0 0 42px 42px;padding:38px 32px 130px}.upcomingWrap{display:grid;grid-template-columns:430px 1fr;gap:32px;align-items:start}.calendarCard{margin:-94px 0 18px 22px}.upcoming{padding-top:6px}.detailGrid{grid-template-columns:repeat(4,1fr)}}@media(max-width:680px){.siteHead{align-items:flex-start;flex-direction:column}.nav{width:100%;overflow:auto}.tab,.addBtn{padding:9px 11px}.hero{margin:0 -14px}.formGrid,.urlRow{grid-template-columns:1fr}.full{grid-column:auto}.modal{padding:0}.modal.open{place-items:end center}.sheet{border-radius:22px 22px 0 0}.pageHead h1{font-size:36px}.actions{grid-template-columns:1fr 1fr}}
</style>

<body>
<div class="app">
<header class="siteHead"><div class="logo"><span class="logoMark">∞</span>loop</div><nav class="nav"><button class="tab active" data-view="events">Events</button><button class="tab" data-view="timeline">Timeline</button><button class="tab" data-view="gantt">Gantt</button><button class="addBtn" id="openAdd">Add Event</button></nav></header>
<main class="shell">
<section id="events" class="view active">
  <div class="hero"><div class="heroGrid"><h1 class="heroTitle">Today<br>Evening<br>Event Update</h1><div class="heroIcon"><svg viewBox="0 0 64 64" fill="none"><path d="M38 8l6 10-12 7-6-10 12-7z" fill="#fff"/><path d="M29 26l12-7 3 5-12 7-3-5zM25 33c8 9 18 13 30 9" stroke="#fff" stroke-width="2" stroke-linecap="round"/><path d="M18 48h34" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg></div></div><svg class="star one" width="76" height="76" viewBox="0 0 76 76" fill="none"><path d="M38 0l5 29 22-20-16 25 27 4-28 5 16 24-22-19-4 28-5-28-22 20 16-25-27-5 28-4-16-24 22 19 4-29z" stroke="#fff"/></svg><svg class="star two" width="68" height="68" viewBox="0 0 76 76" fill="none"><path d="M38 0l5 29 22-20-16 25 27 4-28 5 16 24-22-19-4 28-5-28-22 20 16-25-27-5 28-4-16-24 22 19 4-29z" stroke="#fff"/></svg></div>
  <div class="upcomingWrap"><div><div class="calendarCard"><div class="calTop"><button class="calNav" id="prevMonth">‹</button><span id="calTitle">Month</span><button class="calNav" id="nextMonth">›</button></div><div class="calGrid" id="calendarGrid"></div></div></div><div class="upcoming"><div class="sectionLabel"><span>Upcoming Event</span><button class="seeAll tab" data-view="timeline">See all &gt;</button></div><div id="eventList"></div></div></div>
</section>
<section id="timeline" class="view subPage"><div class="pageHead"><div><div class="sectionLabel"><span>Timeline</span></div><h1 id="timelineTitle">Timeline</h1></div></div><div class="timelineList" id="timelineList"></div></section>
<section id="gantt" class="view subPage"><div class="pageHead"><div><div class="sectionLabel"><span>Gantt</span></div><h1 id="ganttTitle">Month</h1></div></div><div id="ganttBox"></div></section>
</main>
</div>
<div class="modal" id="addModal"><div class="sheet"><div class="sheetHead"><h2>Add Event</h2><button class="x" id="closeAdd">×</button></div><div class="urlTool"><label>Import Helper</label><div class="urlRow"><textarea id="eventbriteUrl" placeholder="Paste Eventbrite URL or copied event details"></textarea><button class="miniBtn" id="parseEventbrite" type="button">Fill</button></div><div class="helperText">For full Eventbrite extraction from URL only, a server/Edge Function is needed. Paste copied event details for better detection.</div></div><form id="eventForm" class="formGrid"><div class="field full"><label>Event Name</label><input id="name" required></div><div class="field"><label>Category</label><select id="cat" required><option value="" selected disabled>Select category</option><option>Food</option><option>Music</option><option>Comedy</option><option>Culture</option><option>Sport</option><option>Nightlife</option><option>Market</option><option>Other</option></select></div><div class="field"><label>Price</label><select id="price"><option>I don't know</option><option>Free</option><option>Under £5</option><option>Under £10</option><option>Under £15</option><option>Under £20</option><option>Under £25</option><option>Over £25</option></select></div><div class="field"><label>Date</label><input id="date" type="date" required></div><div class="field"><label>Time</label><input id="time" type="time" required></div><div class="field full"><label>Ticket Page Link</label><input id="ticket" type="url"></div><div class="field"><label>Postcode</label><input id="postcode" required></div><div class="field"><label>Added By</label><input id="added" maxlength="4" required></div><button class="submit full" type="submit">Save Event</button></form></div></div><div class="toast" id="toast">Saved</div>
<script>
const SUPABASE_URL='https://apvzsvwqxnnjpyrkikns.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFwdnpzdndxeG5uanB5cmtpa25zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2NjgwODUsImV4cCI6MjA5NDI0NDA4NX0.aNhZJkoDpJknhimyf6n1IUPca4Rrqesuxjk_jAPSj5M';
const DELETE_CODE='1313',statuses=["Interested","Can't Attend","Let's Talk","Booked","Cancelled"];let events=[],calendarCursor=new Date();
const headers={apikey:SUPABASE_ANON_KEY,Authorization:`Bearer ${SUPABASE_ANON_KEY}`,'Content-Type':'application/json'};
async function api(path,options={}){const r=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{...options,headers:{...headers,...(options.headers||{})}});const text=await r.text();if(!r.ok){let msg=text;try{const j=JSON.parse(text);msg=j.message||j.details||text}catch{}throw new Error(msg||r.statusText)}if(!text)return null;try{return JSON.parse(text)}catch{return text}}
const $=s=>document.querySelector(s);function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600)}function init(v){return String(v||'').trim().toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,4)}function esc(v){return String(v||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}function dt(s){return new Date(s+'T00:00:00')}function mon(s){return dt(s).toLocaleDateString('en-GB',{month:'short'})}function day(s){return dt(s).toLocaleDateString('en-GB',{day:'2-digit'})}function month(s){return dt(s).toLocaleDateString('en-GB',{month:'long',year:'numeric'})}function pretty(s){return dt(s).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})}function maps(p){return 'https://www.google.com/maps/search/?api=1&query='+encodeURIComponent(p)}function cls(s){return {'Interested':'interested',"Can't Attend":'cant',"Let's Talk":'talk','Booked':'booked','Cancelled':'cancelled'}[s]||'nostatus'}function opts(sel='Interested'){return statuses.map(s=>`<option ${s===sel?'selected':''}>${s}</option>`).join('')}function sorted(){return[...events].sort((a,b)=>(a.date+'T'+a.time).localeCompare(b.date+'T'+b.time))}function chips(e){const a=Object.entries(e.entries||{});return a.length?a.map(([i,s])=>`<span class="chip ${cls(s)}">${esc(i)} · ${esc(s)}</span>`).join(''):'<span class="chip nostatus">No status</span>'}function empty(t){return `<div class="empty">${t}</div>`}
function mapRows(rows,entriesRows){const byEvent={};(entriesRows||[]).forEach(x=>{byEvent[x.event_id]??={};byEvent[x.event_id][x.initials]=x.status});return rows.map(r=>({id:r.id,name:r.name,category:r.category,date:r.event_date,time:String(r.event_time).slice(0,5),ticket:r.ticket_url||'',price:r.price,postcode:r.postcode,added:r.added_by,entries:byEvent[r.id]||{}}))}
async function loadEvents(){try{const rows=await api('loop_events?select=*&order=event_date.asc&order=event_time.asc');const ids=(rows||[]).map(r=>r.id);const entries=ids.length?await api(`loop_event_entries?select=*&event_id=in.(${ids.join(',')})`):[];events=mapRows(rows||[],entries||[]);if(events[0])calendarCursor=dt(events[0].date);render()}catch(e){console.error(e);$('#eventList').innerHTML=empty('Database issue: '+esc(e.message||'Check Supabase.'));toast(e.message||'Database error')}};
function renderCalendar(){const grid=$('#calendarGrid'),y=calendarCursor.getFullYear(),m=calendarCursor.getMonth();$('#calTitle').textContent=calendarCursor.toLocaleDateString('en-GB',{month:'long'});const first=new Date(y,m,1),days=new Date(y,m+1,0).getDate(),offset=(first.getDay()+6)%7,eventsByDay={};events.forEach(e=>{const d=dt(e.date);if(d.getFullYear()===y&&d.getMonth()===m)eventsByDay[d.getDate()]=true});let html=['M','T','W','T','F','S','S'].map(d=>`<div class="calDow">${d}</div>`).join('');for(let i=0;i<offset;i++)html+='<div></div>';let firstHit=true;for(let d=1;d<=days;d++){const has=eventsByDay[d];html+=`<div class="calDay ${has?(firstHit?'primary':'has'):''}">${d}</div>`;if(has)firstHit=false}grid.innerHTML=html}
function renderEvents(){const list=sorted();if(!list.length){$('#eventList').innerHTML=empty('No events yet. Tap Add Event to create the first shared plan.');renderCalendar();return}$('#eventList').innerHTML=list.map(e=>`<div class="row"><div><p class="rowTitle">${esc(e.name)}</p><div class="rowMeta">${pretty(e.date)} · ${esc(e.time)} · ${esc(e.category)}</div></div><button class="viewBtn" data-detail="${e.id}">View Event</button></div><div class="detail" id="detail-${e.id}"><h3>${esc(e.name)}</h3><div class="detailGrid"><div class="detailBox">Date<strong>${pretty(e.date)}</strong></div><div class="detailBox">Time<strong>${esc(e.time)}</strong></div><div class="detailBox">Price<strong>${esc(e.price)}</strong></div><div class="detailBox">Postcode<strong>${esc(e.postcode)}</strong></div></div><div class="chips">${chips(e)}</div><div class="actions"><a class="action" target="_blank" rel="noreferrer" href="${maps(e.postcode)}">Directions</a>${e.ticket?`<a class="action" target="_blank" rel="noreferrer" href="${esc(e.ticket)}">Ticket</a>`:'<button class="action" disabled>No ticket</button>'}<button class="action primary" data-toggle="${e.id}">Respond / Edit</button><button class="action danger" data-del="${e.id}">Remove</button></div><div class="drawer" id="drawer-${e.id}"><div class="formGrid"><div class="field"><label>Initials</label><input maxlength="4" data-in="${e.id}"></div><div class="field"><label>Status</label><select data-st="${e.id}">${opts()}</select></div><button class="save full" data-save="${e.id}">Save Status</button></div></div></div>`).join('');document.querySelectorAll('[data-detail]').forEach(b=>b.onclick=()=>$('#detail-'+b.dataset.detail).classList.toggle('open'));document.querySelectorAll('[data-toggle]').forEach(b=>b.onclick=()=>$('#drawer-'+b.dataset.toggle).classList.toggle('open'));document.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>deleteEvent(b.dataset.del));document.querySelectorAll('[data-save]').forEach(b=>b.onclick=()=>saveEntry(b.dataset.save));document.querySelectorAll('[data-in]').forEach(i=>i.oninput=()=>{i.value=init(i.value);const e=events.find(x=>x.id===i.dataset.in);if(e&&e.entries&&e.entries[i.value])document.querySelector(`[data-st="${i.dataset.in}"]`).value=e.entries[i.value]});renderCalendar()}
async function deleteEvent(id){const code=prompt('Enter delete passcode');if(code!==DELETE_CODE){toast('Wrong passcode');return}try{await api(`loop_events?id=eq.${encodeURIComponent(id)}`,{method:'DELETE'});await loadEvents();toast('Removed')}catch(e){toast(e.message||'Delete failed')}}async function saveEntry(id){const i=document.querySelector(`[data-in="${id}"]`),s=document.querySelector(`[data-st="${id}"]`),v=init(i.value);if(!v){toast('Enter initials');i.focus();return}try{await api('loop_event_entries?on_conflict=event_id,initials',{method:'POST',headers:{Prefer:'resolution=merge-duplicates'},body:JSON.stringify({event_id:id,initials:v,status:s.value})});await loadEvents();toast('Saved')}catch(e){toast(e.message||'Save failed')}}
function renderTimeline(){const box=$('#timelineList'),list=sorted();if(!list.length){$('#timelineTitle').textContent='Timeline';box.innerHTML=empty('Events appear here once added.');return}$('#timelineTitle').textContent=month(list[0].date);box.innerHTML=list.map(e=>`<div class="tlItem"><div class="tlDate"><span class="mm">${mon(e.date)}</span><span class="dd">${day(e.date)}</span></div><div class="tlBody"><h3>${esc(e.name)}</h3><div class="rowMeta">${esc(e.time)} · ${esc(e.category)} · ${esc(e.postcode)}</div><div class="chips">${chips(e)}</div></div></div>`).join('')}
function renderGantt(){const box=$('#ganttBox'),list=sorted();if(!list.length){$('#ganttTitle').textContent='Gantt';box.innerHTML=empty('Add events to see them plotted across the month.');return}$('#ganttTitle').textContent=month(list[0].date);const days=Array.from({length:31},(_,i)=>i+1);box.innerHTML=`<div class="ganttWrap"><div class="gantt"><div class="ganttDays"><span></span>${days.map(d=>`<span>${d}</span>`).join('')}</div>${list.map(e=>{const d=Number(day(e.date));return `<div class="ganttRow"><div class="ganttName">${esc(e.name)}</div>${days.map(x=>`<div class="gCell ${x===d?'gBar':''}"></div>`).join('')}</div>`}).join('')}</div></div>`}function render(){renderEvents();renderTimeline();renderGantt()}
document.querySelectorAll('[data-view]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-view]').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));b.classList.add('active');$('#'+b.dataset.view).classList.add('active')});$('#prevMonth').onclick=()=>{calendarCursor=new Date(calendarCursor.getFullYear(),calendarCursor.getMonth()-1,1);renderCalendar()};$('#nextMonth').onclick=()=>{calendarCursor=new Date(calendarCursor.getFullYear(),calendarCursor.getMonth()+1,1);renderCalendar()};$('#openAdd').onclick=()=>$('#addModal').classList.add('open');$('#closeAdd').onclick=()=>$('#addModal').classList.remove('open');$('#addModal').onclick=e=>{if(e.target.id==='addModal')e.currentTarget.classList.remove('open')};function inferCategory(text){const t=text.toLowerCase();if(/food|dinner|supper|brunch|coffee|market/.test(t))return'Food';if(/music|gig|concert|jazz|dj/.test(t))return'Music';if(/comedy|stand.?up/.test(t))return'Comedy';if(/sport|football|tennis|run|climb/.test(t))return'Sport';if(/club|party|nightlife|bar/.test(t))return'Nightlife';if(/museum|gallery|theatre|art|culture|exhibition/.test(t))return'Culture';return'Other'}
$('#parseEventbrite').onclick=()=>{const raw=$('#eventbriteUrl').value.trim();if(!raw){toast('Paste a link or details first');return}const urlMatch=raw.match(/https?:\/\/\S+/);if(urlMatch)$('#ticket').value=urlMatch[0].replace(/[),.]+$/,'');try{if(urlMatch){const u=new URL($('#ticket').value);let slug=u.pathname.split('/').filter(Boolean).find(x=>x.length>8&&x!=='e');if(slug){slug=slug.replace(/-tickets.*$/,'').replace(/-\d+$/,'').replace(/-/g,' ');$('#name').value=slug.replace(/\b\w/g,c=>c.toUpperCase())}}}catch{}if(!$('#cat').value)$('#cat').value=inferCategory(raw);const pc=raw.match(/[A-Z]{1,2}\d[A-Z\d]?\s*\d[A-Z]{2}/i);if(pc)$('#postcode').value=pc[0].toUpperCase();const iso=raw.match(/\b(20\d{2})[-/](\d{1,2})[-/](\d{1,2})\b/);if(iso)$('#date').value=`${iso[1]}-${iso[2].padStart(2,'0')}-${iso[3].padStart(2,'0')}`;const time=raw.match(/\b([01]?\d|2[0-3])[:.]([0-5]\d)\b/);if(time)$('#time').value=`${time[1].padStart(2,'0')}:${time[2]}`;if(/free/i.test(raw))$('#price').value='Free';toast('Imported what the browser can read')};
$('#eventForm').onsubmit=async e=>{e.preventDefault();const added=init($('#added').value);if(!added){toast('Enter initials');return}const payload={name:$('#name').value.trim(),category:$('#cat').value,event_date:$('#date').value,event_time:$('#time').value,ticket_url:$('#ticket').value.trim()||null,price:$('#price').value,postcode:$('#postcode').value.trim().toUpperCase(),added_by:added};try{await api('loop_events',{method:'POST',headers:{Prefer:'return=minimal'},body:JSON.stringify(payload)});e.target.reset();$('#price').value="I don't know";$('#eventbriteUrl').value='';$('#addModal').classList.remove('open');await loadEvents();toast('Event added')}catch(err){toast(err.message||'Add failed')}};
renderCalendar();loadEvents();setInterval(loadEvents,30000);document.addEventListener('visibilitychange',()=>{if(!document.hidden)loadEvents()});
</script>
